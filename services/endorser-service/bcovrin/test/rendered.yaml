metadata:
  name: bcovrin-endorser-acapy-postgres-init-scripts
  namespace: 8ad0ea-prod
  labels:
    helm.sh/chart: postgres-0.15.5
    app.kubernetes.io/name: acapy-postgres
    app.kubernetes.io/instance: bcovrin-endorser
