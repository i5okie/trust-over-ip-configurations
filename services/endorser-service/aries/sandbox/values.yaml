global:
  ingressSuffix: ".apps.silver.devops.gov.bc.ca"
  security:
    allowInsecureImages: true

endorser-service:
  fullnameOverride: "aries-endorser-sandbox"

  # =============================================================================
  # Endorser API
  # =============================================================================

  replicaCount: 1

  image:
    repository: ghcr.io/openwallet-foundation/acapy-endorser-service/endorser
    pullPolicy: IfNotPresent
    tag: ""

  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 10m
      memory: 256Mi

  api:
    publicName: "BC Endorser Sandbox Service"
    publicDesc: "An endorser service for BC issuer agents"
    adminUser: endorser-admin
    logLevel: INFO
    autoAcceptConnections: true
    autoAcceptAuthors: true
    autoEndorseRequests: true
    autoEndorseTxnTypes: ""
    rejectByDefault: false
    webConcurrency: "2"
    environment: sandbox
    jwtAccessTokenExpireMinutes: 300
    acapyAdminUrl: "https://aries-endorser-agent-admin-sandbox.apps.silver.devops.gov.bc.ca"

  secrets:
    api:
      existingSecret: "aries-endorser-sandbox-api"
      keys:
        endorserAdminApiKey: endorser-admin-api-key
        webhookApiKey: webhook-api-key
    database:
      retainOnUninstall: true
    jwt:
      retainOnUninstall: true

  # =============================================================================
  # ACA-Py Agent
  # =============================================================================

  acapy:
    enabled: true
    replicaCount: 1
    image:
      registry: ghcr.io
      repository: openwallet-foundation/acapy-endorser-service/agent
      tag: "1.1.3"

    argfile.yml:
      auto-accept-invites: false
      auto-accept-requests: false
      debug-webhooks: true
      label: "Government of British Columbia - Sandbox Endorser"
      endorser-protocol-role: endorser
      requests-through-public-did: true
      auto-promote-author-did: false
      public-invites: true
      notify-revocation: true
      monitor-revocation-notification: true
      wallet-name: aries-endorser-agent-wallet
      wallet-type: askar
      wallet-storage-type: postgres_storage
      read-only-ledger: false
      no-ledger: false
      auto-provision: true
      emit-new-didcomm-prefix: true
      auto-ping-connection: true
      monitor-ping: true
      log-level: info
      plugin: []

    ledgers.yml:
      - id: BCovrin Test
        is_production: false
        is_write: true
        genesis_url: "http://test.bcovrin.vonx.io/genesis"

    plugin-config.yml: null
      # did-webvh: null

    walletStorageConfig:
      max_connections: 5
      wallet_scheme: DatabasePerWallet

    secrets:
      api:
        existingSecret: "aries-endorser-sandbox-acapy-api"
        secretKeys:
          adminApiKey: adminApiKey
          walletKey: walletKey
          jwtKey: jwt
      seed:
        enabled: true
        existingSecret: "aries-endorser-sandbox-acapy-seed"
        secretKeys:
          seed: seed

    extraEnvVarsSecret: "aries-endorser-sandbox-acapy-webhook"

    agentUrl: "https://aries-endorser-agent-sandbox.apps.silver.devops.gov.bc.ca"
    adminUrl: "https://aries-endorser-agent-admin-sandbox.apps.silver.devops.gov.bc.ca"

    websockets:
      enabled: true

    service:
      ports:
        http: 8050
        admin: 8051
        ws: 8052

    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 160Mi

    persistence:
      enabled: false
    networkPolicy:
      enabled: false

    extraDeploy:
      - apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: "{{ .Release.Name }}-acapy-postgres"
        spec:
          podSelector:
            matchLabels:
              app.kubernetes.io/name: acapy-postgres
              app.kubernetes.io/instance: "{{ .Release.Name }}"
          ingress:
            - from:
                - podSelector:
                    matchLabels:
                      app.kubernetes.io/name: acapy
                      app.kubernetes.io/instance: "{{ .Release.Name }}"
              ports:
                - port: 5432
                  protocol: TCP

    postgres:
      enabled: true
      nameOverride: acapy-postgres
      targetPlatform: "openshift"
      auth:
        existingSecret: aries-endorser-sandbox-acapy-postgres
        secretKeys:
          adminPasswordKey: postgres-password
      customUser:
        existingSecret: aries-endorser-sandbox-acapy-postgres
        customUser:
        database: "default_wallet"
        name: "User_6b7TNqM8"
        secretKeys:
          name: user
          database: database
          password: password
      # To retain DB data explicitly
      # resources, limits, PVC sizes map to defaults or open-ended specs unless overridden.
      persistence:
        size: 1Gi
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 10m
          memory: 10Mi
      config:
        postgresql:
          max_connections: 500

  postgres:
    enabled: true
    targetPlatform: "openshift"
    auth:
      existingSecret: "aries-endorser-sandbox-postgres"
      secretKeys:
        adminPasswordKey: postgres-password
    customUser:
      existingSecret: "aries-endorser-sandbox-postgres"
      database: "endorser_controller_db"
      name: "User_XIKke2Ss"
      secretKeys:
        name: user
        database: database
        password: password
    persistence:
      size: 2Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 10m
        memory: 10Mi
    config:
      postgresql:
        max_connections: 500

  # =============================================================================
  # Caddy Reverse Proxy
  # =============================================================================

  proxy:
    enabled: true
    replicaCount: 1
    resources:
      limits:
        cpu: 300m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi

    ingress:
      enabled: true
      annotations:
        route.openshift.io/termination: edge
        haproxy.router.openshift.io/timeout: 60s
      hosts:
        - host: aries-endorser-agent-sandbox.apps.silver.devops.gov.bc.ca
          paths:
            - path: /
              pathType: ImplementationSpecific
              servicePort: agent
        - host: aries-endorser-agent-admin-sandbox.apps.silver.devops.gov.bc.ca
          paths:
            - path: /
              pathType: ImplementationSpecific
              servicePort: admin
        - host: aries-endorser-service-sandbox.apps.silver.devops.gov.bc.ca
          paths:
            - path: /
              pathType: ImplementationSpecific
              servicePort: endorser
