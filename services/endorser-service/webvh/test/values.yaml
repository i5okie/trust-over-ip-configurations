# =============================================================================
# Helm Values Override: WebVH Endorser Service (Test)
# Chart: openwallet-foundation/endorser-service (version 1.0.0)
# Release name: webvh-endorser (example)
#
# Deploy with:
#   helm template webvh-endorser endorser-service -f values.yaml
#   helm install webvh-endorser endorser-service -f values.yaml
#
# =============================================================================
# REQUIRED PRE-CREATED SECRETS (before helm install):
#
# 1. webvh-endorser-postgres (controller DB)
# 2. webvh-endorser-acapy-postgres (wallet DB)
# 3. webvh-endorser-api (endorser API)
# 4. webvh-endorser-acapy-api (ACA-Py agent)
# 5. webvh-endorser-acapy-seed (ACA-Py wallet seed)
# 6. webvh-endorser-acapy-webhook (optional webhook env)
# =============================================================================
# WebVH vs Indy (aries/): no Hyperledger Indy pool — ACA-Py uses the webvh
# plugin and plugin-config.yml.webvh.server_url only.
# =============================================================================

global:
  ingressSuffix: ".apps.silver.devops.gov.bc.ca"
  security:
    allowInsecureImages: true

endorser-service:
  fullnameOverride: "webvh-endorser-test"

  # =============================================================================
  # Endorser API
  # =============================================================================

  replicaCount: 1

  image:
    repository: ghcr.io/openwallet-foundation/acapy-endorser-service/endorser
    pullPolicy: IfNotPresent
    tag: ""

  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 10m
      memory: 256Mi

  api:
    publicName: "BC WebVH Endorser Service (test)"
    publicDesc: "WebVH (did:webvh) endorser for BC issuer agents."
    adminUser: endorser-admin
    logLevel: INFO
    autoAcceptConnections: false
    autoAcceptAuthors: false
    autoEndorseRequests: false
    autoEndorseTxnTypes: ""
    rejectByDefault: false
    webConcurrency: "2"
    environment: test
    jwtAccessTokenExpireMinutes: 300
    acapyAdminUrl: "https://endorser-agent-webvh-admin-test.apps.silver.devops.gov.bc.ca"

  secrets:
    api:
      existingSecret: "webvh-endorser-api"
      keys:
        endorserAdminApiKey: endorser-admin-api-key
        webhookApiKey: webhook-api-key
    database:
      retainOnUninstall: true
    jwt:
      retainOnUninstall: true

  # =============================================================================
  # ACA-Py Agent
  # =============================================================================

  acapy:
    enabled: true
    image:
      registry: ghcr.io
      repository: openwallet-foundation/acapy-endorser-service/agent
      tag: "1.1.3"

    argfile.yml:
      label: "Government of British Columbia - WebVH Endorser (test)"
      endorser-protocol-role: endorser
      requests-through-public-did: false
      auto-promote-author-did: false
      public-invites: false
      notify-revocation: true
      monitor-revocation-notification: true
      wallet-name: webvh-endorser-agent-wallet
      wallet-type: askar-anoncreds
      wallet-storage-type: postgres_storage
      # read-only-ledger: false  # WebVH: no Indy ledger; rely on chart/agent default
      no-ledger: true
      auto-provision: true
      emit-new-didcomm-prefix: true
      auto-ping-connection: true
      monitor-ping: true
      log-level: WARNING
      plugin:
        - webvh

    ledgers.yml: []

    plugin-config.yml:
      webvh:
        server_url: "https://registry-test.digitaltrust.gov.bc.ca"

    walletStorageConfig:
      max_connections: 5
      wallet_scheme: DatabasePerWallet

    secrets:
      api:
        existingSecret: "webvh-endorser-acapy-api"
        secretKeys:
          adminApiKey: adminApiKey
          walletKey: walletKey
          jwtKey: jwt
      seed:
        enabled: true
        existingSecret: "webvh-endorser-acapy-seed"
        secretKeys:
          seed: seed

    extraEnvVarsSecret: "webvh-endorser-acapy-webhook"

    agentUrl: "https://endorser-agent-webvh-test.apps.silver.devops.gov.bc.ca"
    adminUrl: "https://endorser-agent-webvh-admin-test.apps.silver.devops.gov.bc.ca"

    websockets:
      enabled: true

    service:
      ports:
        http: 8050
        admin: 8051
        ws: 8052

    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 160Mi

    persistence:
      enabled: false
    networkPolicy:
      enabled: false

    extraDeploy:
      - apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: "{{ .Release.Name }}-acapy-postgres"
        spec:
          podSelector:
            matchLabels:
              app.kubernetes.io/name: acapy-postgres
              app.kubernetes.io/instance: "{{ .Release.Name }}"
          policyTypes:
            - Ingress
          ingress:
            - from:
                - podSelector:
                    matchLabels:
                      app.kubernetes.io/name: acapy
                      app.kubernetes.io/instance: "{{ .Release.Name }}"
              ports:
                - port: 5432
                  protocol: TCP

    postgres:
      enabled: true
      nameOverride: acapy-postgres
      targetPlatform: "openshift"
      auth:
        existingSecret: "webvh-endorser-acapy-postgres"
        secretKeys:
          adminPasswordKey: postgres-password
      customUser:
        existingSecret: "webvh-endorser-acapy-postgres"
        database: "default_wallet"
        name: "User_WebVhTstW"
        secretKeys:
          name: user
          database: database
          password: password
      persistence:
        size: 1Gi
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 10m
          memory: 10Mi
      config:
        postgresql:
          max_connections: 500

  postgres:
    enabled: true
    targetPlatform: "openshift"
    auth:
      existingSecret: "webvh-endorser-postgres"
      secretKeys:
        adminPasswordKey: postgres-password
    customUser:
      existingSecret: "webvh-endorser-postgres"
      database: "endorser_controller_db"
      name: "User_WebVhTstC"
      secretKeys:
        name: user
        database: database
        password: password
    persistence:
      size: 2Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 10m
        memory: 10Mi
    config:
      postgresql:
        max_connections: 500

  # =============================================================================
  # Caddy Reverse Proxy
  # =============================================================================

  proxy:
    enabled: true
    replicaCount: 1
    resources:
      limits:
        cpu: 300m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi

    ingress:
      enabled: true
      annotations:
        route.openshift.io/termination: edge
        haproxy.router.openshift.io/timeout: 60s
      hosts:
        - host: endorser-agent-webvh-test.apps.silver.devops.gov.bc.ca
          paths:
            - path: /
              pathType: ImplementationSpecific
              servicePort: agent
        - host: endorser-agent-webvh-admin-test.apps.silver.devops.gov.bc.ca
          paths:
            - path: /
              pathType: ImplementationSpecific
              servicePort: admin
        - host: endorser-api-webvh-test.apps.silver.devops.gov.bc.ca
          paths:
            - path: /
              pathType: ImplementationSpecific
              servicePort: endorser
