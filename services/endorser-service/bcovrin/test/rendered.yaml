apiVersion: batch/v1
kind: Job
metadata:
  name: bcovrin-endorser-migrate
  namespace: "8ad0ea-prod"
  labels:
    helm.sh/chart: endorser-service-1.0.0
    app.kubernetes.io/name: endorser-service
    app.kubernetes.io/instance: bcovrin-endorser
    app.kubernetes.io/version: "1.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: endorser-service
        app.kubernetes.io/instance: bcovrin-endorser
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: default
      initContainers:
        - name: wait-for-db
          image: "busybox:1.36.1"
          command: ["/bin/sh","-c"]
          args:
            - >-
              until nc -z bcovrin-endorser-postgres 5432; do echo waiting for db; sleep 2; done;

      containers:
        - name: migrate
          image: "ghcr.io/openwallet-foundation/acapy-endorser-service/endorser:1.1.1"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh","-c"]
          args: ["python3 -m alembic upgrade head"]
          env:
            - name: ACAPY_ADMIN_URL
              value: "http://bcovrin-endorser-acapy:8051"
            - name: CONTROLLER_POSTGRESQL_HOST
              value: "bcovrin-endorser-postgres"
            - name: CONTROLLER_POSTGRESQL_PORT
              value: "5432"
            - name: CONTROLLER_POSTGRESQL_DB
              value: "endorser_controller_db"
            - name: CONTROLLER_POSTGRESQL_USER
              value: "User_JtT4zHB7"
            - name: CONTROLLER_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bcovrin-endorser-postgres
                  key: "password"
            - name: CONTROLLER_POSTGRESQL_ADMIN_USER
              value: "postgres"
            - name: CONTROLLER_POSTGRESQL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bcovrin-endorser-postgres
                  key: "postgres-password"
