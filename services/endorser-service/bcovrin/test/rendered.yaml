apiVersion: v1
kind: ConfigMap
metadata:
  name: bcovrin-endorser-proxy-caddy-conf
  namespace: "8ad0ea-prod"
  labels:
    helm.sh/chart: endorser-service-1.0.0
    app.kubernetes.io/name: endorser-service
    app.kubernetes.io/instance: bcovrin-endorser
    app.kubernetes.io/version: "1.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: proxy
  annotations: {}
data:
  Caddyfile: |
    # ACA-Py Agent endpoint with WebSocket support
    :{$CADDY_AGENT_PORT} {
      @websockets {
        header Connection *Upgrade*
        header Upgrade websocket
      }
    
      handle @websockets {
        reverse_proxy http://{$ACAPY_AGENT_HOST}:{$ACAPY_WS_PORT}
      }
    
      handle {
        encode gzip
        reverse_proxy http://{$ACAPY_AGENT_HOST}:{$ACAPY_HTTP_PORT}
      }
    
      log {
        output stdout
        level INFO
      }
    }
    
    # ACA-Py Admin endpoint
    :{$CADDY_AGENT_ADMIN_PORT} {
      encode gzip
      reverse_proxy http://{$ACAPY_AGENT_HOST}:{$ACAPY_ADMIN_PORT}
    
      log {
        output stdout
        level INFO
      }
    }
    
    # Endorser Service API endpoint
    :{$CADDY_ENDORSER_SERVICE_PORT} {
      encode gzip
      reverse_proxy http://{$ENDORSER_SERVICE_HOST}:{$ENDORSER_SERVICE_PORT}
    
      log {
        output stdout
        level INFO
      }
    }
---
