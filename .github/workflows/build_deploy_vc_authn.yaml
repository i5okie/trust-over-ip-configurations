name: Build and Deploy VC-AuthN to DEV/TEST/PROD

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream image tag to use as base (e.g., 2.3.0)'
        required: false
        default: ''

jobs:
  build_image:
    name: "Build BCGov VC-AuthN Controller"
    runs-on: ubuntu-latest
    if: github.repository_owner == 'bcgov'
    steps:
      - uses: actions/checkout@v6
      - name: Build VC-AuthN
        uses: ./.github/actions/build_image
        id: builder
        with:
          context: "./services/vc-authn-oidc"
          dockerfile: "./services/vc-authn-oidc/Dockerfile"
          image_name: ${{ github.repository_owner}}/acapy-vc-authn-oidc
          image_tag: ${{ inputs.tag }}
          registry: ghcr.io
          registry_username: ${{ github.repository_owner}}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      image_tag: ${{ steps.builder.outputs.image_tag }}
      image_version: ${{ steps.builder.outputs.image_version }}

  update-configs-and-sync:
    runs-on: ubuntu-latest
    name: Update Configs and Sync
    needs:
      - build_image
    steps:
      - name: Create GitHub App token for GitOps repo
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.TEAM_CDT_GITHUB_APP_ID }}
          private-key: ${{ secrets.TEAM_CDT_GITHUB_APP_PRIVATE_KEY }}
          owner: bcgov-c
          repositories: ministry-gitops-ditp

      - name: Checkout GitOps repo
        uses: actions/checkout@v6
        with:
          repository: bcgov-c/ministry-gitops-ditp
          token: ${{ steps.app-token.outputs.token }}
          sparse-checkout: |
            services/vc-authn-oidc/charts

      - name: Lookup latest chart version
        id: chart_version
        run: |
          helm repo add openwallet-foundation https://openwallet-foundation.github.io/helm-charts/
          helm repo update
          echo "CHART_VERSION=$(helm search repo openwallet-foundation/vc-authn-oidc -ojson | jq -r '.[0].version')" >> $GITHUB_OUTPUT

      - name: Create branch
        env:
          IMAGE_VERSION: ${{ needs.build_image.outputs.image_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b chore/vc-authn-${IMAGE_VERSION}

      - name: Update dev
        env:
          APP_VERSION: ${{ needs.build_image.outputs.image_version }}
          CHART_VERSION: ${{ steps.chart_version.outputs.CHART_VERSION }}
          IMAGE_TAG: ${{ needs.build_image.outputs.image_version }}
        run: |
          yq e -i '.vc-authn-oidc.image.tag = env(IMAGE_TAG)' services/vc-authn-oidc/charts/dev/values.yaml
          yq e -i '.appVersion = env(APP_VERSION)' services/vc-authn-oidc/charts/dev/Chart.yaml
          yq e -i '.version = env(CHART_VERSION)' services/vc-authn-oidc/charts/dev/Chart.yaml
          yq e -i '.dependencies[0].version = env(CHART_VERSION)' services/vc-authn-oidc/charts/dev/Chart.yaml

      - name: Update test
        env:
          APP_VERSION: ${{ needs.build_image.outputs.image_version }}
          CHART_VERSION: ${{ steps.chart_version.outputs.CHART_VERSION }}
          IMAGE_TAG: ${{ needs.build_image.outputs.image_version }}
        run: |
          yq e -i '.vc-authn-oidc.image.tag = env(IMAGE_TAG)' services/vc-authn-oidc/charts/test/values.yaml
          yq e -i '.appVersion = env(APP_VERSION)' services/vc-authn-oidc/charts/test/Chart.yaml
          yq e -i '.version = env(CHART_VERSION)' services/vc-authn-oidc/charts/test/Chart.yaml
          yq e -i '.dependencies[0].version = env(CHART_VERSION)' services/vc-authn-oidc/charts/test/Chart.yaml

      - name: Update prod
        env:
          APP_VERSION: ${{ needs.build_image.outputs.image_version }}
          CHART_VERSION: ${{ steps.chart_version.outputs.CHART_VERSION }}
          IMAGE_TAG: ${{ needs.build_image.outputs.image_version }}
        run: |
          yq e -i '.vc-authn-oidc.image.tag = env(IMAGE_TAG)' services/vc-authn-oidc/charts/prod/values.yaml
          yq e -i '.appVersion = env(APP_VERSION)' services/vc-authn-oidc/charts/prod/Chart.yaml
          yq e -i '.version = env(CHART_VERSION)' services/vc-authn-oidc/charts/prod/Chart.yaml
          yq e -i '.dependencies[0].version = env(CHART_VERSION)' services/vc-authn-oidc/charts/prod/Chart.yaml

      - name: Commit, push, and open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE_VERSION: ${{ needs.build_image.outputs.image_version }}
          CHART_VERSION: ${{ steps.chart_version.outputs.CHART_VERSION }}
        run: |
          git add services/vc-authn-oidc/charts/dev/Chart.yaml services/vc-authn-oidc/charts/dev/values.yaml
          git add services/vc-authn-oidc/charts/test/Chart.yaml services/vc-authn-oidc/charts/test/values.yaml
          git add services/vc-authn-oidc/charts/prod/Chart.yaml services/vc-authn-oidc/charts/prod/values.yaml
          git commit -m "chore: update vc-authn-oidc to ${IMAGE_VERSION} (chart ${CHART_VERSION})"
          git push origin chore/vc-authn-${IMAGE_VERSION}
          cat > /tmp/pr-body.md << EOF
          Automated update from trust-over-ip-configurations CI.

          ## Changes
          - Image tag: \`${IMAGE_VERSION}\`
          - Helm chart version: \`${CHART_VERSION}\`
          - Environments updated: dev, test, prod
          EOF
          gh pr create \
            --repo bcgov-c/ministry-gitops-ditp \
            --base main \
            --head chore/vc-authn-${IMAGE_VERSION} \
            --title "chore: update vc-authn-oidc to ${IMAGE_VERSION}" \
            --body-file /tmp/pr-body.md
